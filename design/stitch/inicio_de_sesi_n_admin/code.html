<body class="min-h-screen flex items-center justify-center font-body-md text-on-surface antialiased bg-[url('https://images.unsplash.com/photo-1586528116311-ad8ed745d151?ixlib=rb-4.0.3&amp;auto=format&amp;fit=crop&amp;w=2000&amp;q=80')] bg-cover bg-center bg-no-repeat relative before:absolute before:inset-0 before:bg-surface-bright/80 before:backdrop-blur-sm" data-alt="A sophisticated warehouse logistics center viewed from an elevated angle, bathed in clean, cool-toned daylight. The scene features highly organized racks of inventory stretching into the distance, with minimalist geometric lines and a modern, high-tech aesthetic. The color palette emphasizes corporate navy blues, bright whites, and subtle grays, conveying a sense of order, precision, and professional efficiency suitable for an enterprise logistics platform.">
<main class="relative z-10 w-full max-w-md px-md">
<!-- Login Card -->
<div class="glass-card rounded-xl p-xl flex flex-col gap-xl">
<!-- Brand Identity -->
<div class="text-center flex flex-col items-center gap-sm">
<div class="w-16 h-16 bg-primary rounded-lg flex items-center justify-center ambient-shadow mb-sm">
<span class="material-symbols-outlined text-surface-bright text-4xl" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary">Pa' Donde Natty</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Inventory Management System</p>
</div>
<!-- Divider -->
<div class="w-full h-px bg-outline-variant/50"></div>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-lg" method="POST" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
<!-- Email Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Admin Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input class="block w-full pl-xl pr-sm py-sm font-body-md text-body-md bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:border-primary transition-all placeholder:text-outline/50" id="email" name="email" placeholder="admin@padondenatty.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline focus:outline-none focus:ring-2 focus:ring-primary rounded" href="#">Forgot?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="block w-full pl-xl pr-sm py-sm font-body-md text-body-md bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:border-primary transition-all placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full flex justify-center items-center gap-sm bg-primary text-on-primary font-label-md text-label-md py-md px-lg rounded-lg ambient-shadow hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 transition-all mt-sm" type="submit">
<span>Secure Login</span>
<span class="material-symbols-outlined text-xl">login</span>
</button>
</form>

<p class="font-label-sm text-label-sm text-on-surface-variant/70">
<span class="material-symbols-outlined text-[14px] align-middle mr-xs">shield</span>
