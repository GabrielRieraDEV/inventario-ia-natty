    body {

<body class="bg-black text-surface-bright m-0 p-0 overflow-hidden select-none">
<!-- Main Full Screen Container -->
<div class="relative w-screen h-[884px] flex flex-col justify-between">
<!-- Background Camera Feed Placeholder -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-80" data-alt="A slightly blurred, first-person camera view looking down an aisle of a modern, brightly lit warehouse. Tall metal shelving units on both sides are neatly stocked with various cardboard boxes and plastic-wrapped pallets. The lighting is artificial but bright and cool, casting soft shadows and emphasizing a clean, organized industrial environment. The focus is soft, simulating an autofocus lens searching for a subject in the foreground." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDbCaTrhkKwT2mFRydWSw-NhdsWilJ0Rtvks9cgYBeZP_n7fQCShUS1TSTRtIWjGdthyqBFBlWHdRAdlGbRDdCgo9suTorWH6-qi38RVOQ-KqjCdSXK1RBYVhBjsH1QBY27uTW-BlPMJs7L5DIiXo4UMEQfY_9uJMoN8ovD1NzQEy_10SA6xCZOnWC639pymZxI3MiUGXWrd3oxOaNr--oPAym2LvFFiyPlY-1Lw5LM_dL7UoDlJ4wSao9m056rPO2YUEekx4JNhMg"/>
</div>
<!-- Top Status Overlay -->
<div class="relative z-10 w-full pt-xl px-md pb-xl bg-gradient-to-b from-black/80 via-black/40 to-transparent flex justify-between items-start">
<!-- Close Button (Simulated action: go back to previous non-task screen) -->
<button class="w-10 h-10 rounded-full bg-inverse-surface/60 backdrop-blur-md flex items-center justify-center text-surface-bright hover:bg-inverse-surface/80 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<!-- Status Indicator -->
<div class="flex items-center gap-sm bg-inverse-surface/70 backdrop-blur-md px-md py-sm rounded-full shadow-lg border border-surface-bright/10 mt-xs">
<span class="material-symbols-outlined animate-spin text-[18px] text-primary-fixed">progress_activity</span>
<span class="font-label-md text-label-md text-surface-bright tracking-wide">Buscando vínculo...</span>
</div>
<!-- Flash Toggle -->
<button class="w-10 h-10 rounded-full bg-inverse-surface/60 backdrop-blur-md flex items-center justify-center text-surface-bright hover:bg-inverse-surface/80 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">flash_auto</span>
</button>
</div>
<!-- Center Aiming Area -->
<div class="relative z-10 flex-1 flex flex-col items-center justify-center px-lg">
<!-- Reticle / Frame -->
<div class="w-[280px] h-[280px] relative mb-xl">
<!-- Outer glow subtle ring -->
<div class="absolute inset-0 rounded-lg border border-surface-bright/20 shadow-[0_0_30px_rgba(255,255,255,0.1)]"></div>
<!-- Corner Indicators -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary-fixed rounded-tl-lg"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary-fixed rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary-fixed rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary-fixed rounded-br-lg"></div>
<!-- Scanning Laser Line -->
<div class="absolute top-1/2 left-4 right-4 h-[2px] bg-primary-fixed shadow-[0_0_12px_rgba(216,226,255,1)] animate-scan z-20"></div>
<!-- Darkened area outside the reticle to focus attention -->
<!-- Achieved by keeping the center clear and the rest of the screen having a slight dark overlay if needed, but current bg-gradient handles edges -->
</div>
<!-- Instructional Text -->
<div class="bg-black/50 backdrop-blur-md px-lg py-sm rounded-full shadow-lg border border-surface-bright/10 max-w-[85%] text-center">
<p class="font-body-md text-body-md text-surface-bright">Apunte al código de barras o producto</p>
</div>
</div>
<!-- Bottom Controls Overlay -->
<div class="relative z-10 w-full pb-xxl pt-xl px-xl bg-gradient-to-t from-black via-black/80 to-transparent flex justify-between items-center">
<!-- Gallery Access (Subtle) -->
<button class="w-12 h-12 rounded-full bg-inverse-surface/40 backdrop-blur-md flex items-center justify-center text-surface-bright/80 hover:text-surface-bright hover:bg-inverse-surface/60 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">photo_library</span>
</button>
<!-- Primary Capture Button -->
<!-- Using a large distinct shape to act as the primary CTA in this task flow -->
<div class="relative group cursor-pointer">
<!-- Outer Ring -->
<div class="w-[84px] h-[84px] rounded-full border-[3px] border-surface-bright/80 flex items-center justify-center p-1 group-active:scale-95 transition-transform duration-150">
<!-- Inner Solid Circle -->
<div class="w-full h-full rounded-full bg-surface-bright shadow-[0_4px_12px_rgba(0,0,0,0.5)] group-hover:bg-primary-fixed transition-colors duration-200"></div>
</div>
</div>
<!-- Input Mode Switch (e.g., Keyboard entry fallback) -->
<button class="w-12 h-12 rounded-full bg-inverse-surface/40 backdrop-blur-md flex items-center justify-center text-surface-bright/80 hover:text-surface-bright hover:bg-inverse-surface/60 transition-all">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">keyboard</span>
</button>
</div>
</div>
